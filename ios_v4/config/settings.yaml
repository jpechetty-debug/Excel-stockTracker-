# IOS Application Settings
# Controls the runtime behavior, providers, and pipeline

application:
  threads: 8
  debug: false
  
market:
  exchange: NS

data_source:
  provider: "yfinance" # can be switched to 'mock' or 'nse'
  timeout_seconds: 30
  retries: 3
  
cache:
  enabled: true
  dir: ".cache"
  expiry_hours: 24
  
portfolio:
  size: 1000000

valuation:
  margin_of_safety:
    default: 0.20
  dcf:
    terminal_growth: 0.045
    discount_rate: 0.11
    max_growth: 0.25
    min_growth: 0.05

  
excel:
  backup_dir: ".backups"
  date_format: "%Y%m%d_%H%M%S"
  
logging:
  level: "INFO"
  file: "logs/ios.log"
  structured: true
  
rules:
  active_version: "v4_0"

llm:
  anthropic_api_key: "" # Set your API key here or via ANTHROPIC_API_KEY environment variable
