# Excel Column Mapping
# Strictly defines what can be overwritten and where to find the data.

sheets:
  master: "Master Universe"
  portfolio: "Portfolio Tracker"
  dashboard: "Dashboard"

keys:
  primary: "Ticker"
  company: "Company"

zones:
  system:
    - field: current_price
      column: "Current Price"
    - field: previous_close
      column: "Previous Close"
    - field: market_cap
      column: "Market Cap"
    - field: dividend_yield
      column: "Dividend Yield"
    - field: beta
      column: "Beta"
    - field: pe
      column: "P/E"
    - field: pb
      column: "P/B"
    - field: roe
      column: "ROE %"
    - field: roce
      column: "ROCE %"
    - field: business_confidence
      column: "Business Confidence (%)"
    - field: business_score
      column: "Business Score"
    - field: score_status
      column: "Score Status"
    - field: investment_score
      column: "Investment Score"
    - field: investment_confidence
      column: "Investment Confidence (%)"
    - field: risk_score
      column: "Risk Score (Engine)"
    - field: risk_confidence
      column: "Risk Confidence (%)"
    - field: margin_of_safety
      column: "Margin of Safety %"
    - field: target_allocation
      column: "Target Allocation %"
    - field: portfolio_weight
      column: "Portfolio Weight"
    - field: ev_ebit
      column: "EV/EBIT"
    - field: fcf_yield
      column: "FCF Yield %"
    - field: valuation_status
      column: "Valuation Status"
    - field: margin_of_safety_bucket
      column: "Valuation Label"
    - field: intrinsic_value
      column: "Intrinsic Value"
    - field: growth_rate_used
      column: "Growth Rate Used %"
    - field: justified_pe
      column: "Justified P/E"
    - field: buy_price
      column: "Buy Price"
    - field: eps_implied
      column: "EPS Implied (Rs, Price/PE)"
    - field: position_size
      column: "Position Size (₹)"
    - field: recommendation
      column: "Overall Recommendation"

  manual:
    - column: "Investment Thesis"
    - column: "Remarks"
    - column: "Key Risks"
    - column: "Decision Journal"
    - column: "Catalyst"
    - column: "Sources Verified"
    - column: "Last Reviewed"
    - column: "Core / Bench / Research"
    # Pre-existing hand-scored qualitative conviction fields (columns Z-AD in Master Universe).
    # Explicitly protected so no future system field can be accidentally mapped onto them
    # the way the engine's computed "risk_score" originally collided with "Risk Score".
    - column: "Capital Allocation Score"
    - column: "Management Score"
    - column: "Moat Score"
    - column: "Growth Score"
    - column: "Risk Score"
